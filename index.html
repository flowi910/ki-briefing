<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KI-Briefing</title>
<meta name="description" content="Dein tägliches deutsches KI-Briefing: Überschriften, Zusammenfassungen, Begriffserklärungen und Tutor-Chat.">
<meta name="theme-color" content="#14141f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KI-Briefing">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
/* Hallmark · genre: atmospheric · theme: Lumen Night Foundry · see tokens.css for stamp */
* { box-sizing: border-box; margin: 0; }
html, body { overflow-x: clip; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--color-paper);
  color: var(--color-ink);
  font-family: var(--font-body);
  font-size: var(--text-md);
  line-height: 1.6;
  min-height: 100dvh;
  padding-bottom: calc(env(safe-area-inset-bottom) + var(--space-2xl));
}
body::before, body::after {
  content: "";
  position: fixed;
  z-index: -1;
  border-radius: 50%;
  filter: blur(70px);
  pointer-events: none;
}
body::before {
  width: 55vw; height: 55vw; max-width: 420px; max-height: 420px;
  top: -12vh; right: -18vw;
  background: radial-gradient(circle, oklch(45% 0.09 60 / 0.5), transparent 70%);
}
body::after {
  width: 45vw; height: 45vw; max-width: 340px; max-height: 340px;
  bottom: -10vh; left: -15vw;
  background: radial-gradient(circle, oklch(38% 0.08 300 / 0.4), transparent 70%);
}

.wrap { max-width: 640px; margin: 0 auto; padding: 0 var(--space-md); }

/* Header */
header {
  padding-top: calc(env(safe-area-inset-top) + var(--space-xl));
  padding-bottom: var(--space-lg);
}
.kicker {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--color-ink-3);
  margin-bottom: var(--space-xs);
}
h1 {
  font-family: var(--font-display);
  font-style: normal;
  font-weight: 400;
  font-size: var(--text-display);
  line-height: 1.05;
  letter-spacing: -0.01em;
  overflow-wrap: anywhere;
  min-width: 0;
}
h1 .verb {
  color: var(--color-accent);
  border-bottom: 2px solid var(--color-accent);
}
.header-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: var(--space-md);
}
.header-actions { display: flex; gap: var(--space-xs); flex-shrink: 0; }

/* Buttons */
.btn {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--color-ink);
  background: var(--color-paper-2);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-pill);
  padding: 0.55em 1.1em;
  cursor: pointer;
  white-space: nowrap;
  transition: background var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out), opacity var(--dur-fast) var(--ease-out);
}
.btn:hover { background: var(--color-paper-3); }
.btn:focus-visible { outline: 2px solid var(--color-focus); outline-offset: 2px; }
.btn:active { transform: translateY(1px); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn[data-state="loading"] { opacity: 0.7; pointer-events: none; }
.btn[data-state="error"] { border-color: var(--color-error); color: var(--color-error); }
.btn[data-state="success"] { border-color: var(--color-success); color: var(--color-success); }
.btn-accent {
  background: var(--color-accent);
  border-color: var(--color-accent);
  color: var(--color-accent-ink);
}
.btn-accent:hover { background: var(--color-accent-deep); border-color: var(--color-accent-deep); }

/* Feed */
.feed { display: grid; gap: var(--space-md); grid-template-columns: minmax(0, 1fr); }
.card {
  background: var(--color-paper-2);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  animation: rise var(--dur-med) var(--ease-out) both;
}
@keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.card-meta {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-ink-3);
  margin-bottom: var(--space-sm);
  flex-wrap: wrap;
}
.badge-new {
  color: var(--color-accent-ink);
  background: var(--color-accent);
  border-radius: var(--radius-pill);
  padding: 0.1em 0.7em;
  letter-spacing: 0.08em;
}
.card h2 {
  font-family: var(--font-display);
  font-style: normal;
  font-weight: 400;
  font-size: var(--text-xl);
  line-height: 1.2;
  letter-spacing: -0.005em;
  margin-bottom: var(--space-sm);
  overflow-wrap: anywhere;
  min-width: 0;
}
.summary {
  color: var(--color-ink-2);
  font-size: var(--text-sm);
  line-height: 1.65;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card.open .summary { display: block; -webkit-line-clamp: unset; }
.more {
  background: none; border: none; padding: 0;
  font: inherit; font-size: var(--text-sm); font-weight: 500;
  color: var(--color-accent);
  cursor: pointer;
  margin-top: var(--space-xs);
}
.more:focus-visible { outline: 2px solid var(--color-focus); outline-offset: 2px; border-radius: var(--radius-sm); }
.chips { display: flex; flex-wrap: wrap; gap: var(--space-xs); margin-top: var(--space-md); }
.chip {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--color-accent);
  background: none;
  border: 1px solid var(--color-line);
  border-radius: var(--radius-pill);
  padding: 0.35em 0.9em;
  cursor: pointer;
  transition: background var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out);
}
.chip:hover { border-color: var(--color-accent); background: var(--color-paper-3); }
.chip:focus-visible { outline: 2px solid var(--color-focus); outline-offset: 2px; }
.chip:active { transform: translateY(1px); }
.card-actions {
  display: flex;
  gap: var(--space-xs);
  margin-top: var(--space-md);
  padding-top: var(--space-md);
  border-top: 1px solid var(--color-line);
  flex-wrap: wrap;
}
.card-actions a { text-decoration: none; display: inline-block; }

/* States: loading / empty / error */
.state {
  text-align: center;
  padding: var(--space-2xl) var(--space-md);
  color: var(--color-ink-3);
  font-size: var(--text-sm);
}
.state strong { color: var(--color-ink-2); font-weight: 500; }
.skeleton {
  height: 9rem;
  border-radius: var(--radius-lg);
  background: linear-gradient(100deg, var(--color-paper-2) 40%, var(--color-paper-3) 50%, var(--color-paper-2) 60%);
  background-size: 200% 100%;
  animation: shimmer 1.4s linear infinite;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* Bottom sheet */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: oklch(10% 0.01 265 / 0.6);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--dur-med) var(--ease-out);
  z-index: 40;
}
.sheet-backdrop.show { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  z-index: 50;
  background: var(--color-paper-2);
  border: 1px solid var(--color-line);
  border-bottom: none;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  max-height: 82dvh;
  display: flex;
  flex-direction: column;
  transform: translateY(105%);
  transition: transform var(--dur-med) var(--ease-out);
  padding-bottom: env(safe-area-inset-bottom);
}
.sheet.show { transform: none; }
.sheet-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-md);
  padding: var(--space-md) var(--space-lg);
  border-bottom: 1px solid var(--color-line);
}
.sheet-head h3 {
  font-family: var(--font-display);
  font-style: normal;
  font-weight: 400;
  font-size: var(--text-lg);
  overflow-wrap: anywhere;
  min-width: 0;
}
.sheet-close {
  background: none; border: none;
  color: var(--color-ink-3);
  font-size: 1.4rem;
  line-height: 1;
  cursor: pointer;
  padding: var(--space-2xs) var(--space-xs);
  border-radius: var(--radius-sm);
}
.sheet-close:hover { color: var(--color-ink); }
.sheet-close:focus-visible { outline: 2px solid var(--color-focus); outline-offset: 2px; }
.sheet-body {
  padding: var(--space-lg);
  overflow-y: auto;
  flex: 1;
  min-height: 0;
}
.sheet-body p.explain { color: var(--color-ink-2); font-size: var(--text-sm); line-height: 1.7; }

/* Chat */
.chat-log { display: grid; gap: var(--space-sm); }
.msg {
  padding: var(--space-sm) var(--space-md);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  line-height: 1.6;
  max-width: 88%;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}
.msg.user {
  background: var(--color-accent);
  color: var(--color-accent-ink);
  justify-self: end;
  border-bottom-right-radius: var(--radius-sm);
}
.msg.bot {
  background: var(--color-paper-3);
  color: var(--color-ink);
  justify-self: start;
  border-bottom-left-radius: var(--radius-sm);
}
.msg.bot.thinking { color: var(--color-ink-3); }
.msg.bot.error { border: 1px solid var(--color-error); color: var(--color-error); }
.chat-form {
  display: flex;
  gap: var(--space-xs);
  padding: var(--space-md) var(--space-lg);
  border-top: 1px solid var(--color-line);
}
.chat-input {
  flex: 1;
  min-width: 0;
  font: inherit;
  font-size: 16px; /* verhindert iOS-Zoom beim Fokussieren */
  color: var(--color-ink);
  background: var(--color-paper);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-pill);
  padding: 0.6em 1.1em;
}
.chat-input::placeholder { color: var(--color-ink-3); }
.chat-input:focus-visible { outline: 2px solid var(--color-focus); outline-offset: 1px; }
.chat-input:disabled { opacity: 0.5; }

footer {
  margin-top: var(--space-2xl);
  padding: var(--space-lg) 0;
  border-top: 1px solid var(--color-line);
  color: var(--color-ink-3);
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
  display: flex;
  justify-content: space-between;
  gap: var(--space-md);
  flex-wrap: wrap;
}

@media (prefers-reduced-motion: reduce) {
  .card { animation: none; }
  .skeleton { animation: none; }
  .sheet, .sheet-backdrop, .btn, .chip { transition-duration: 1ms; }
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="kicker">Tägliches Briefing · Deutsch</p>
    <div class="header-row">
      <h1>Was die KI-Welt heute <span class="verb">bewegt</span>.</h1>
      <div class="header-actions">
        <button class="btn" id="refreshBtn" type="button">Aktualisieren</button>
        <button class="btn btn-accent" id="tutorBtn" type="button">Fragen</button>
      </div>
    </div>
  </header>

  <main id="feed" class="feed" aria-live="polite">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </main>

  <footer>
    <span>KI-Briefing</span>
    <span>Quellen: THE DECODER · Golem KI</span>
  </footer>
</div>

<div class="sheet-backdrop" id="backdrop"></div>

<section class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
  <div class="sheet-head">
    <h3 id="sheetTitle">Begriff</h3>
    <button class="sheet-close" id="sheetClose" type="button" aria-label="Schließen">×</button>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
  <form class="chat-form" id="chatForm" hidden>
    <input class="chat-input" id="chatInput" type="text" placeholder="Deine Frage auf Deutsch …" autocomplete="off">
    <button class="btn btn-accent" id="chatSend" type="submit">Senden</button>
  </form>
</section>

<script>
var API = "https://flowi-n8n.de/webhook";
var articles = [];
var chatContext = "";

function el(tag, cls, text) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text) e.textContent = text;
  return e;
}

function timeLabel(iso) {
  var d = new Date(iso);
  if (isNaN(d)) return "";
  var diff = (Date.now() - d.getTime()) / 3600000;
  if (diff < 1) return "vor wenigen Minuten";
  if (diff < 24) return "vor " + Math.round(diff) + " Std.";
  return d.toLocaleDateString("de-DE", { day: "2-digit", month: "short" });
}

function render() {
  var feed = document.getElementById("feed");
  feed.innerHTML = "";
  if (!articles.length) {
    var s = el("div", "state");
    s.innerHTML = "<strong>Noch keine News da.</strong><br>Tippe oben auf „Aktualisieren“ — das Sammeln dauert etwa eine Minute.";
    feed.appendChild(s);
    return;
  }
  articles.forEach(function (a, i) {
    var card = el("article", "card");
    card.style.animationDelay = Math.min(i * 60, 360) + "ms";

    var meta = el("div", "card-meta");
    var isNew = (Date.now() - new Date(a.createdAt).getTime()) < 24 * 3600000;
    if (isNew) meta.appendChild(el("span", "badge-new", "Neu"));
    var src = a.source;
    if (!src || src === "Unbekannt") {
      var m = (a.url || "").match(/^https?:\/\/([^\/]+)/);
      src = m ? m[1].replace("www.", "") : "Quelle";
    }
    meta.appendChild(el("span", null, src));
    meta.appendChild(el("span", null, "·"));
    meta.appendChild(el("span", null, timeLabel(a.pubDate || a.createdAt)));
    card.appendChild(meta);

    card.appendChild(el("h2", null, a.title));

    var sum = el("p", "summary", a.summary || "");
    card.appendChild(sum);

    var more = el("button", "more", "Weiterlesen");
    more.type = "button";
    more.addEventListener("click", function () {
      card.classList.toggle("open");
      more.textContent = card.classList.contains("open") ? "Einklappen" : "Weiterlesen";
    });
    card.appendChild(more);

    var terms = [];
    try { terms = JSON.parse(a.begriffe || "[]"); } catch (e) {}
    if (terms.length) {
      var chips = el("div", "chips");
      terms.forEach(function (t) {
        var chip = el("button", "chip", t.begriff);
        chip.type = "button";
        chip.addEventListener("click", function () { openTerm(t, a); });
        chips.appendChild(chip);
      });
      card.appendChild(chips);
    }

    var actions = el("div", "card-actions");
    var ask = el("button", "btn", "Frage zum Artikel");
    ask.type = "button";
    ask.addEventListener("click", function () { openChat(a); });
    actions.appendChild(ask);
    var link = el("a");
    link.href = a.url;
    link.target = "_blank";
    link.rel = "noopener";
    link.appendChild(el("span", "btn", "Zur Quelle"));
    actions.appendChild(link);
    card.appendChild(actions);

    feed.appendChild(card);
  });
}

function loadNews() {
  fetch(API + "/ki-news")
    .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(function (data) {
      articles = Array.isArray(data) ? data : [data];
      articles = articles.filter(function (a) { return a && a.title; });
      render();
    })
    .catch(function () {
      var feed = document.getElementById("feed");
      feed.innerHTML = "";
      var s = el("div", "state");
      s.innerHTML = "<strong>News konnten nicht geladen werden.</strong><br>Prüfe deine Internetverbindung und versuche es erneut.";
      var retry = el("button", "btn", "Erneut versuchen");
      retry.type = "button";
      retry.style.marginTop = "1rem";
      retry.addEventListener("click", loadNews);
      s.appendChild(document.createElement("br"));
      s.appendChild(retry);
      feed.appendChild(s);
    });
}

/* Bottom sheet */
var sheet = document.getElementById("sheet");
var backdrop = document.getElementById("backdrop");
var sheetTitle = document.getElementById("sheetTitle");
var sheetBody = document.getElementById("sheetBody");
var chatForm = document.getElementById("chatForm");
var chatInput = document.getElementById("chatInput");
var chatSend = document.getElementById("chatSend");
var chatLog = null;

function openSheet(title, withChat) {
  sheetTitle.textContent = title;
  sheetBody.innerHTML = "";
  chatForm.hidden = !withChat;
  sheet.classList.add("show");
  backdrop.classList.add("show");
}
function closeSheet() {
  sheet.classList.remove("show");
  backdrop.classList.remove("show");
  chatLog = null;
}
document.getElementById("sheetClose").addEventListener("click", closeSheet);
backdrop.addEventListener("click", closeSheet);
document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeSheet(); });

function openTerm(term, article) {
  openSheet(term.begriff, false);
  sheetBody.appendChild(el("p", "explain", term.erklaerung));
  var deeper = el("button", "btn btn-accent", "Genauer erklären");
  deeper.type = "button";
  deeper.style.marginTop = "1.25rem";
  deeper.addEventListener("click", function () {
    openChat(article);
    sendQuestion("Erkläre mir den Begriff „" + term.begriff + "“ noch genauer, mit einem Alltagsbeispiel.");
  });
  sheetBody.appendChild(deeper);
}

function openChat(article) {
  chatContext = article ? (article.title + " — " + article.summary) : "";
  openSheet(article ? "Frage zum Artikel" : "KI-Tutor", true);
  chatLog = el("div", "chat-log");
  var hint = el("div", "msg bot", article
    ? "Frag mich alles zu diesem Artikel — ich erkläre es einfach."
    : "Frag mich alles rund um KI — ich erkläre es einfach und auf Deutsch.");
  chatLog.appendChild(hint);
  sheetBody.appendChild(chatLog);
  chatInput.value = "";
  chatInput.focus();
}

function sendQuestion(question) {
  if (!chatLog) return;
  chatLog.appendChild(el("div", "msg user", question));
  var thinking = el("div", "msg bot thinking", "Denke nach …");
  chatLog.appendChild(thinking);
  sheetBody.scrollTop = sheetBody.scrollHeight;
  chatInput.disabled = true;
  chatSend.disabled = true;

  fetch(API + "/ki-chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ frage: question, kontext: chatContext })
  })
    .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(function (data) {
      thinking.classList.remove("thinking");
      thinking.textContent = data.antwort || "Keine Antwort erhalten.";
    })
    .catch(function () {
      thinking.classList.remove("thinking");
      thinking.classList.add("error");
      thinking.textContent = "Antwort fehlgeschlagen. Versuche es gleich noch einmal.";
    })
    .finally(function () {
      chatInput.disabled = false;
      chatSend.disabled = false;
      chatInput.focus();
      sheetBody.scrollTop = sheetBody.scrollHeight;
    });
}

chatForm.addEventListener("submit", function (e) {
  e.preventDefault();
  var q = chatInput.value.trim();
  if (!q) return;
  chatInput.value = "";
  sendQuestion(q);
});

document.getElementById("tutorBtn").addEventListener("click", function () { openChat(null); });

/* Refresh: neue Artikel sammeln lassen, dann neu laden */
document.getElementById("refreshBtn").addEventListener("click", function () {
  var btn = this;
  btn.dataset.state = "loading";
  btn.textContent = "Sammle …";
  fetch(API + "/ki-collect").catch(function () {});
  setTimeout(function () {
    loadNews();
    btn.dataset.state = "success";
    btn.textContent = "Fertig";
    setTimeout(function () { delete btn.dataset.state; btn.textContent = "Aktualisieren"; }, 2000);
  }, 65000);
  var s = el("div", "state", "Neue Artikel werden gesammelt und zusammengefasst — dauert etwa eine Minute …");
  document.getElementById("feed").prepend(s);
});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(function () {});
}

loadNews();
</script>
</body>
</html>
